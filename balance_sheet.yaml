# Synthetic mid-size commercial bank (~$5B earning assets), calibrated to
# ballpark ratios from FDIC Quarterly Banking Profile peer-group averages for
# banks in the $1B-$10B asset tier. Replace via data_sources/fdic_bank.py for
# a real institution (pass its FDIC certificate number) - that module
# rescales these positions' balances/rates, it does not replace this file.
#
# Each entry maps 1:1 to core.position.Position. `plug: true` marks the one
# position that absorbs the monthly balance-sheet funding gap (assets must
# equal liabilities + equity every month - see model/engine.py);
# `cash_sink: true` marks the position that absorbs surplus cash when the
# gap runs the other way.

positions:
  # ---- Earning assets ----
  - name: "Fed funds sold / IB bank balances"
    side: asset
    category_type: variable
    balance: 150_000_000
    rate: 0.0425
    beta: 1.00
    spread: 0.00
    growth_rate_annual: 0.00
    cash_sink: true

  - name: "Investment securities"
    side: asset
    category_type: laddered
    balance: 900_000_000
    rate: 0.0375
    spread: 0.0050
    ladder_months: 60
    growth_rate_annual: 0.02

  # Quarterly reset (reset_frequency_months=3) - mirrors external-benchmark-linked
  # floating loans that reset on a fixed cadence (e.g. RLLR/MCLR-style 3-month
  # reset) rather than continuously; the rate is flat between reset dates, then
  # jumps to catch up. (A future iteration should replace this whole-book
  # synchronized reset with a staggered cohort schedule.)
  - name: "C&I loans (variable)"
    side: asset
    category_type: variable
    balance: 1_100_000_000
    rate: 0.0750
    beta: 0.90
    spread: 0.0225
    growth_rate_annual: 0.04
    rate_floor: 0.03
    reset_frequency_months: 3

  - name: "CRE loans (fixed)"
    side: asset
    category_type: fixed_amortizing
    balance: 1_600_000_000
    rate: 0.0625
    spread: 0.0200
    cpr_annual: 0.12
    growth_rate_annual: 0.03

  - name: "Residential mortgage"
    side: asset
    category_type: fixed_amortizing
    balance: 700_000_000
    rate: 0.0575
    spread: 0.0150
    cpr_annual: 0.10
    growth_rate_annual: 0.01

  - name: "Consumer / other loans"
    side: asset
    category_type: fixed_amortizing
    balance: 250_000_000
    rate: 0.0850
    spread: 0.0350
    cpr_annual: 0.20
    growth_rate_annual: 0.02

  # ---- Interest-bearing liabilities ----
  # NOW/Savings/MMDA reprice (their coupon can change) almost immediately, but two
  # other behavioral assumptions apply on top of that repricing mechanic, and
  # matter for different reports:
  #   behavioral_duration_years - effective EVE duration AND the gap-report
  #                               repricing ladder; long, because balances
  #                               are sticky.
  #   liquidity_decay_annual    - core-deposit attrition/runoff rate; these are
  #                               non-maturity deposits, so a rate reset is NOT a
  #                               cash outflow - only actual balance attrition is.
  #                               Used by the structural liquidity view only.
  #
  # Each CASA-style product is further split into "core" (stable, seasonally-
  # patterned, sticky - long duration, slow decay) and "non-core" (volatile/rate-
  # shopped balances - short duration, fast decay). This is standard non-maturity-
  # deposit (NMD) behavioral modeling. `seasonal: true` applies
  # SEASONALITY_INDEX_DEPOSITS to that position's monthly growth.
  - name: "NOW - Core"
    side: liability
    category_type: administered
    balance: 420_000_000
    rate: 0.0090
    beta: 0.15
    lag_months: 3
    growth_rate_annual: 0.02
    behavioral_duration_years: 3.5
    liquidity_decay_annual: 0.02
    seasonal: true

  - name: "NOW - Non-Core"
    side: liability
    category_type: administered
    balance: 180_000_000
    rate: 0.0120
    beta: 0.40
    lag_months: 1
    growth_rate_annual: 0.01
    behavioral_duration_years: 0.5
    liquidity_decay_annual: 0.25
    seasonal: true

  - name: "Savings & MMDA - Core"
    side: liability
    category_type: administered
    balance: 780_000_000
    rate: 0.0200
    beta: 0.30
    lag_months: 2
    growth_rate_annual: 0.03
    behavioral_duration_years: 2.5
    liquidity_decay_annual: 0.05
    seasonal: true

  - name: "Savings & MMDA - Non-Core"
    side: liability
    category_type: administered
    balance: 520_000_000
    rate: 0.0260
    beta: 0.65
    lag_months: 1
    growth_rate_annual: 0.02
    behavioral_duration_years: 0.4
    liquidity_decay_annual: 0.35
    seasonal: true

  - name: "Time deposits (CDs)"
    side: liability
    category_type: laddered
    balance: 900_000_000
    rate: 0.0400
    spread: -0.0010
    ladder_months: 14
    growth_rate_annual: 0.02

  - name: "Short-term borrowings (repo/FHLB)"
    side: liability
    category_type: variable
    balance: 200_000_000
    rate: 0.0450
    beta: 0.95
    spread: 0.0010
    growth_rate_annual: 0.00
    plug: true

  - name: "Long-term FHLB / sub debt"
    side: liability
    category_type: laddered
    balance: 300_000_000
    rate: 0.0475
    spread: 0.0075
    ladder_months: 36
    growth_rate_annual: 0.00
