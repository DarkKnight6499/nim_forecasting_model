# Synthetic mid-size commercial bank (~$5B earning assets), calibrated to
# ballpark ratios from FDIC Quarterly Banking Profile peer-group averages for
# banks in the $1B-$10B asset tier. Replace via data_sources/fdic_bank.py for
# a real institution (pass its FDIC certificate number) - that module
# rescales these positions' balances/rates, it does not replace this file.
#
# Each entry maps 1:1 to core.position.Position. `plug: true` marks the one
# position that absorbs the monthly balance-sheet funding gap (assets must
# equal liabilities + equity every month - see core/engine.py);
# `cash_sink: true` marks the position that absorbs surplus cash when the
# gap runs the other way.

positions:
  # ---- Earning assets ----
  - name: "Fed funds sold / IB bank balances"
    side: asset
    category_type: variable
    balance: 150_000_000
    rate: 0.0425
    index: SHORT
    beta: 1.00
    spread: 0.00
    growth_rate_annual: 0.00
    cash_sink: true
    hqla_level: L1
    calibration_category: cash

  # ---- HQLA investment book (was one "Investment securities" line; split
  # for LCR classification - see core/lcr.py). accounting: AFS positions get
  # a monthly MTM series (core/mtm.py); HTM would accrue only (none held here).
  - name: "Cash & central bank reserves"
    side: asset
    category_type: variable
    balance: 80_000_000
    rate: 0.0425
    index: SHORT
    beta: 1.00
    spread: 0.00
    growth_rate_annual: 0.01
    hqla_level: L1
    calibration_category: cash

  - name: "Treasuries"
    side: asset
    category_type: laddered
    balance: 300_000_000
    rate: 0.0350
    index: TENOR
    origination_tenor_years: 1.54  # matches ladder_months=36 average life
    spread: 0.0010
    ladder_months: 36
    growth_rate_annual: 0.02
    hqla_level: L1
    accounting: AFS
    ftp_method: pooled_replicating
    calibration_category: securities

  - name: "Agency MBS"
    side: asset
    category_type: laddered
    balance: 350_000_000
    rate: 0.0400
    index: TENOR
    origination_tenor_years: 2.54  # matches ladder_months=60 average life
    spread: 0.0060
    ladder_months: 60
    growth_rate_annual: 0.02
    hqla_level: L2A
    accounting: HTM
    ftp_method: pooled_replicating
    calibration_category: securities

  - name: "Municipal & corporate bonds"
    side: asset
    category_type: laddered
    balance: 250_000_000
    rate: 0.0450
    index: TENOR
    origination_tenor_years: 3.04  # matches ladder_months=72 average life
    spread: 0.0090
    ladder_months: 72
    growth_rate_annual: 0.01
    hqla_level: L2B
    accounting: AFS
    ftp_method: pooled_replicating
    calibration_category: securities

  # MCLR-indexed (core/indices.py::compute_mclr). Quarterly reset
  # (reset_frequency_months=3) is staggered across 3 cohorts by the engine.
  - name: "C&I loans (variable)"
    side: asset
    category_type: variable
    balance: 1_100_000_000
    rate: 0.0750
    index: MCLR
    spread: 0.0225
    growth_rate_annual: 0.04
    rate_floor: 0.03
    reset_frequency_months: 3
    calibration_category: loans

  - name: "CRE loans (fixed)"
    side: asset
    category_type: fixed_amortizing
    balance: 1_600_000_000
    rate: 0.0625
    index: FIXED
    origination_tenor_years: 10
    spread: 0.0200
    cpr_annual: 0.12
    cpr_max: 0.12  # refi_sensitivity=0: no rate-driven burnout
    growth_rate_annual: 0.03
    calibration_category: loans

  # refi_sensitivity > 0: CPR rises with cohort.rate - new_production_rate, capped at cpr_max.
  - name: "Residential mortgage"
    side: asset
    category_type: fixed_amortizing
    balance: 700_000_000
    rate: 0.0575
    index: FIXED
    origination_tenor_years: 30
    spread: 0.0150
    cpr_annual: 0.10
    refi_sensitivity: 2.5
    cpr_max: 0.40
    growth_rate_annual: 0.01
    calibration_category: loans

  - name: "Consumer / other loans"
    side: asset
    category_type: fixed_amortizing
    balance: 250_000_000
    rate: 0.0850
    index: FIXED
    origination_tenor_years: 5
    spread: 0.0350
    cpr_annual: 0.20
    cpr_max: 0.20  # refi_sensitivity=0
    growth_rate_annual: 0.02
    calibration_category: loans

  # ---- Interest-bearing liabilities ----
  # behavioral_duration_years: EVE duration + gap-report repricing ladder.
  # liquidity_decay_annual: core-deposit attrition rate, used by the structural
  # liquidity view only (a rate reset is not a cash outflow for NMDs).
  # seasonal: true applies SEASONALITY_INDEX_DEPOSITS to monthly growth.
  - name: "NOW - Core"
    side: liability
    category_type: administered
    balance: 420_000_000
    rate: 0.0090
    index: ADMIN
    beta: 0.15
    lag_months: 3
    growth_rate_annual: 0.02
    behavioral_duration_years: 3.5
    liquidity_decay_annual: 0.02
    seasonal: true
    ftp_method: pooled_replicating
    lcr_outflow_category: stable_retail
    calibration_category: deposits

  # Non-Core CASA feeds_mclr_deposit_cost: true (higher beta, closer to market rate).
  # Core CASA does not (sticky, low-beta).
  - name: "NOW - Non-Core"
    side: liability
    category_type: administered
    balance: 180_000_000
    rate: 0.0120
    index: ADMIN
    beta: 0.40
    lag_months: 1
    growth_rate_annual: 0.01
    behavioral_duration_years: 0.5
    liquidity_decay_annual: 0.25
    seasonal: true
    feeds_mclr_deposit_cost: true
    ftp_method: pooled_replicating
    lcr_outflow_category: less_stable_retail
    calibration_category: deposits

  - name: "Savings & MMDA - Core"
    side: liability
    category_type: administered
    balance: 780_000_000
    rate: 0.0200
    index: ADMIN
    beta: 0.30
    lag_months: 2
    growth_rate_annual: 0.03
    behavioral_duration_years: 2.5
    liquidity_decay_annual: 0.05
    seasonal: true
    ftp_method: pooled_replicating
    lcr_outflow_category: stable_retail
    calibration_category: deposits

  - name: "Savings & MMDA - Non-Core"
    side: liability
    category_type: administered
    balance: 520_000_000
    rate: 0.0260
    index: ADMIN
    beta: 0.65
    lag_months: 1
    growth_rate_annual: 0.02
    behavioral_duration_years: 0.4
    liquidity_decay_annual: 0.35
    seasonal: true
    feeds_mclr_deposit_cost: true
    ftp_method: pooled_replicating
    lcr_outflow_category: less_stable_retail
    calibration_category: deposits

  - name: "Time deposits (CDs)"
    side: liability
    category_type: laddered
    balance: 900_000_000
    rate: 0.0400
    index: TENOR
    origination_tenor_years: 0.625  # matches ladder_months=14 average life
    spread: -0.0010
    ladder_months: 14
    growth_rate_annual: 0.02
    feeds_mclr_deposit_cost: true
    ftp_method: pooled_replicating
    lcr_outflow_category: term_deposit
    calibration_category: deposits

  - name: "Short-term borrowings (repo/FHLB)"
    side: liability
    category_type: variable
    balance: 200_000_000
    rate: 0.0450
    index: SHORT
    beta: 0.95
    spread: 0.0010
    growth_rate_annual: 0.00
    plug: true
    lcr_outflow_category: wholesale_non_operational
    calibration_category: borrowings

  - name: "Long-term FHLB / sub debt"
    side: liability
    category_type: laddered
    balance: 300_000_000
    rate: 0.0475
    index: TENOR
    origination_tenor_years: 1.54  # matches ladder_months=36 average life
    spread: 0.0075
    ladder_months: 36
    growth_rate_annual: 0.00
    ftp_method: pooled_replicating
    lcr_outflow_category: wholesale_non_operational
    calibration_category: borrowings
